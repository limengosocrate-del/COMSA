<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>F01 - Fiche de Contrôle</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../../css/fiches.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- ==========================
         EN-TÊTE OFFICIEL
    =========================== -->

    <header class="header">

        <div class="logo">

            <img src="../../assets/logo-rdc.png" alt="Logo RDC">

        </div>

        <div class="titre">

            <h2>RÉPUBLIQUE DÉMOCRATIQUE DU CONGO</h2>

            <h3>MINISTÈRE DE L'EMPLOI ET DU TRAVAIL</h3>

            <h3>INSPECTION GÉNÉRALE DU TRAVAIL</h3>

            <h1>FICHE DE CONTRÔLE F01</h1>

        </div>

    </header>

    <!-- ==========================
          INFORMATIONS GÉNÉRALES
    =========================== -->

    <section class="card">

        <h2>
            <i class="fa-solid fa-circle-info"></i>
            Informations générales
        </h2>

        <div class="grid-4">

            <div>

                <label>Numéro Fiche</label>

                <input
                    type="text"
                    id="numeroFiche"
                    readonly>

            </div>

            <div>

                <label>Date</label>

                <input
                    type="date"
                    id="dateVisite">

            </div>

            <div>

                <label>Heure</label>

                <input
                    type="time"
                    id="heureVisite">

            </div>

            <div>

                <label>Inspecteur</label>

                <input
                    type="text"
                    id="inspecteur"
                    readonly>

            </div>

        </div>

  </section>
