<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGT - Connexion Sécurisée</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- 🌆 BACKGROUND IGT -->
<div class="igt-background"></div>

<!-- 🔷 CONTAINER LOGIN -->
<div class="login-wrapper">

    <!-- 🪪 CARTE LOGIN -->
    <div class="login-card">

        <!-- 🏛 LOGO IGT -->
        <div class="logo-container">
            <img src="assets/logo.png" alt="IGT Logo" class="logo">
            <h2>IGT - RDC</h2>
            <p>Inspection Générale du Travail</p>
        </div>

        <!-- 🔐 FORMULAIRE -->
        <form id="loginForm">

            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="text" id="username" placeholder="Nom d'utilisateur" required>
            </div>

            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" id="password" placeholder="Mot de passe" required>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox"> Se souvenir de moi
                </label>
            </div>

            <button type="submit" class="login-btn">
                <i class="fa fa-right-to-bracket"></i> Connexion
            </button>

        </form>

        <!-- 🤖 IA HELP BOX -->
        <div class="ai-box">
            <h4>🤖 Assistant IGT</h4>
            <p>
                Aide intelligente pour inspecteurs et contrôleurs du travail.
            </p>
        </div>

        <!-- ⏰ INFO SYSTEM -->
        <div class="system-info">
            <span id="clock">00:00:00</span>
        </div>

    </div>

</div>

<!-- JS -->
<script src="js/login.js"></script>

<script>
// 🕒 HORLOGE LIVE
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString();
}, 1000);
</script>

</body>
</html>
